<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/">
    <title>RK</title>
    <link rel="stylesheet" href="main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/assets/bg/x.svg">
</head>
<body>
    <div class="background-container">
        <div class="stars"></div>
        <div class="twinkling"></div>
        <div class="clouds"></div>
    </div>
    <div id="header-bar" class="header">
        <button class="header-button" id="header-left" onclick="navigateHeader('left')">
            <img src="/assets/bg/R.svg" alt="R">
        </button>
        <button class="header-button" id="header-right" onclick="navigateHeader('right')">
            <img src="/assets/bg/K.svg" alt="K">
        </button>
    </div>
    <div id="main-container">
        <div id="nav-bar" class="link-container">
            <div class="link-div">
                <a class="link-url" href="/">Home</a>
            </div>
            <div class="link-div">
                <a class="link-url" href="/projects">Projects</a>
            </div>
            <div class="link-div">
                <a class="link-url" href="/blog">Blog</a>
            </div>
            <div class="link-div">
                <a class="link-url" href="/about">About</a>
            </div>
        </div>
        <div id="project-bar" class="link-container" style="display: none;">
            <div class="link-div">
                <a class="link-url" href="/arch">Arch</a>
            </div>
            <div class="link-div">
                <a class="link-url" href="/design">Design</a>
            </div>
            <div class="link-div">
                <a class="link-url" href="/misc">Misc</a>
            </div>
        </div>
        <div id="main-content"></div>
    </div>
    <div id="footer-bar" class="footer">
        <div>RendraKB©2025</div>
    </div>
    <script src="blog.js"></script>
    <script src="main.js" defer></script>
</body>
</html>
